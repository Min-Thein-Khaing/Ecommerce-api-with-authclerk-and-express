version: "3.8 "

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mtk
      MONGO_INITDB_ROOT_PASSWORD: asdffdsa
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: